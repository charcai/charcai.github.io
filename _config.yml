# Site settings 配置站点
title: 蔡彦恒's Blog
description: '一个"不务正业"的OIer'
keyword: 蔡彦恒, 蔡彦恒的博客, C++
url: 'https://charcai.tk' # your host
# if you don't need baseurl, you should leave this value blank.
baseurl: ''

# Navigation links
nav:
  home: '/'
  tags: '/tags.html'
  about: '/about.html'

# Footer
footer:
  since: 2018

# Author 配置博主信息
author: '蔡彦恒'
nickname: 'CharCai'
bio: '专注 OI && ACM'

avatar: 'https://s1.ax1x.com/2018/06/28/PiGO9x.png'

# Search
search: true

# Night mode
nightMode: false

# Comments 评论功能
comments:
  gitalk: true
  gitalk_clientID: '8cf45a9f76f4435ab295'
  gitalk_Secret: '01c31575df26540d62fe390a6453b37feb6991cb'
  gitalk_repo: 'charcai.github.io'
  gitalk_owner: 'charcai'
  gitalk_admin: 'charcai'
  pagerDirection: 'first'
# distractionFreeMode: false

# MathJax 公式支持 by Ray-Eldath
mathjax: false

# Share
social-share: true
social-share-items: ['qq', 'wechat', 'qzone', 'weibo', 'douban']

# theme color 主题皮肤
theme-color: 'default'  # pink or default

# Post header background patterns (when the post no cover): circuitBoard, overlappingCircles, food, glamorous, ticTacToe, seaOfClouds
postPatterns: 'circuitBoard'

# SNS settings 配置社交网站
# url: email, weibo, zhihu, twitter, instagram, juejin, github, douban, facebook, dribble, uicn, jianshu, medium, linkedin
sns:
  juejin: '//juejin.im/user/5b335c16f265da59780b926e'
  github: '//github.com/charcai'
  email: 'mailto:char_cai@outlook.com'
# Tags 设置标签
recommend-tags: true # whether or not display recommend-tags on the sidebar
recommend-condition-size: 12 # a tag will be recommended if the size of it is more than this value

# Build settings
paginate: 6
paginate_path: 'page:num'
exclude: ['node_modules', 'dev', 'package.json', 'gulpfile.js', '.gitignore', 'README.md', 'update']
#safe: false;

# Markdown
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM

# RSS
RSS: true

# Permalink
# See: https://github.com/kaeyleo/jekyll-theme-H2O/issues/35
permalink: /:year/:month/:day/:title.html

# Plugins
plugins: [jekyll-paginate, jekyll-sitemap]
